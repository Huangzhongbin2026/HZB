version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: supply-task-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: db_supply_task
      MYSQL_USER: supply_user
      MYSQL_PASSWORD: supply123456
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ../docs/03-数据库初始化脚本.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7.2
    container_name: supply-task-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
